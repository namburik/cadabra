<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0f172a; color: #f1f5f9; }
    #status { font-size: 1.1rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <div id="status">Authenticating, please wait...</div>
  <script>
    (async () => {
      const statusEl = document.getElementById('status');
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const oauthError = params.get('error');
      const oauthErrorDesc = params.get('error_description');

      if (oauthError) {
        statusEl.textContent = `Auth error: ${oauthErrorDesc || oauthError}`;
        statusEl.style.color = '#dc2626';
        console.error('[OAuth] Provider error:', oauthError, oauthErrorDesc);
        setTimeout(() => { window.location.href = '/'; }, 4000);
        return;
      }

      if (!code) {
        statusEl.textContent = 'Error: No authorization code received.';
        statusEl.style.color = '#dc2626';
        setTimeout(() => { window.location.href = '/'; }, 3000);
        return;
      }

      try {
        console.log('[OAuth] Code received:', code.substring(0, 10) + '...');
        // Determine provider from state param: LinkedIn sets state=linkedin, GitHub sets state=github
        const provider = params.get('state') === 'linkedin' ? 'linkedin' : 'github';
        const endpoint = provider === 'linkedin'
          ? '/api/auth/linkedin-exchange-token'
          : '/api/auth/exchange-token';
        console.log(`[OAuth] Provider: ${provider}, calling ${endpoint}...`);
        let response, data;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        console.log('[OAuth] API response status:', response.status);
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Server error: ${response.status} - ${errorText}`);
        }
        data = await response.json();
        console.log('[OAuth] Auth data received:', data);
        if (data.error) {
          statusEl.textContent = `Error: ${data.error}`;
          statusEl.style.color = '#dc2626';
          console.error('[OAuth] API error:', data.error, data.details);
          setTimeout(() => { window.location.href = '/'; }, 3000);
          return;
        }
        // Store auth data in localStorage keyed by provider
        if (provider === 'linkedin') {
          localStorage.setItem('linkedin-auth', JSON.stringify({
            email: data.email,
            firstName: data.firstName,
            lastName: data.lastName,
            token: data.token
          }));
        } else {
          localStorage.setItem('github-auth', JSON.stringify({
            login: data.login,
            email: data.email,
            avatar_url: data.avatar_url,
            token: data.token
          }));
        }
        // Remove code param from URL to prevent re-use after sign-out
        if (window.history.replaceState) {
          const url = new URL(window.location.href);
          url.searchParams.delete('code');
          window.history.replaceState({}, document.title, url.pathname + url.search);
        }
        statusEl.textContent = 'Welcome! Redirecting...';
        statusEl.style.color = '#22c55e';
        const returnTo = (() => { try { return sessionStorage.getItem('auth-return-to'); } catch(e){ return null; } })();
        if (returnTo) { try { sessionStorage.removeItem('auth-return-to'); } catch(e){} }
        setTimeout(() => { window.location.href = returnTo || '/blogs.html'; }, 1500);
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        statusEl.style.color = '#dc2626';
        console.error('[OAuth] Auth error:', err);
        console.error('[OAuth] Error details:', { message: err.message, code: err.code, name: err.name });
        setTimeout(() => { window.location.href = '/'; }, 3000);
      }
    })();
  </script>
</body>
</html>
