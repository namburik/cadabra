<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authentication — agentic and authentic</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <script>
    (async function(){
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      const statusEl = document.getElementById('status');
      
      if(error){
        statusEl.textContent = `Authentication failed: ${error}`;
        statusEl.style.color = '#dc2626';
        setTimeout(() => { window.location.href = '/'; }, 3000);
        return;
      }

      if(!code){
        statusEl.textContent = 'No code received. Redirecting...';
        setTimeout(() => { window.location.href = '/'; }, 2000);
        return;
      }

      statusEl.textContent = 'Exchanging code for token...';

      try {
        statusEl.textContent = 'Exchanging code for token...';
        console.log('Code received:', code.substring(0, 10) + '...');
        
        // Call backend endpoint to exchange code for access token
        // with a timeout to prevent hanging
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout
        
        const response = await fetch('/api/auth/exchange-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
          signal: controller.signal
        });

        clearTimeout(timeoutId);
        
        console.log('API response status:', response.status);

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Server error: ${response.status} - ${errorText}`);
        }

        const data = await response.json();
        console.log('Auth data received:', data);
        
        if(data.error){
          statusEl.textContent = `Error: ${data.error}`;
          statusEl.style.color = '#dc2626';
          console.error('API error:', data.error, data.details);
          setTimeout(() => { window.location.href = '/'; }, 3000);
          return;
        }

        // Store auth data in localStorage
        localStorage.setItem('github-auth', JSON.stringify({
          login: data.login,
          id: data.id,
          avatar_url: data.avatar_url,
          token: data.token
        }));

        statusEl.textContent = `Welcome, ${data.login}! Redirecting...`;
        statusEl.style.color = '#22c55e';
        console.log('Auth successful, redirecting to blogs');
        setTimeout(() => { window.location.href = '/blogs.html'; }, 1500);

      } catch(err) {
        clearTimeout(timeoutId);
        statusEl.textContent = `Error: ${err.message}`;
        statusEl.style.color = '#dc2626';
        console.error('Auth error:', err);
        console.error('Error details:', { message: err.message, code: err.code, name: err.name });
        setTimeout(() => { window.location.href = '/'; }, 3000);
      }
    })();
  </script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    #status {
      font-size: 1.1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="status">Authenticating...</div>
</body>
</html>
